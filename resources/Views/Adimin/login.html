<header>
<!--Responsdividade do layout-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</header>

<div class="d-flex justify-content-center">
    <div class="card mt-3 text-dark text-center" style="width: 30rem;">
        <div class="card-header">
            <h1>Login</h1>
        </div>

        <div class="card-body">

            {{status}}
            
                <!--Formulario de login, dividido em duas classes, uma para o email e outra para a senha, com um botão de submit-->
            <form method="post">
                <div class="form-group ">
                   <label>E-mail</label>
                    <input type="email" class="form-control" name="email" placeholder="email@teste.com" required autofocus>
                </div>

                <div class="form-group my-3">
                   <label>Senha</label>
                    <input type="password" class="form-control" name="senha" placeholder="********" required>
                </div>

                <button type="submit" class="btn btn-lg btn-danger">Entrar</button>
            </form>
        </div>
    </div>
</div>
